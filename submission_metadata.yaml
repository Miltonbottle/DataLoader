# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"    # Primary: architecture design, pipeline optimization, code review, bug detection
  - "Gemini"    # Secondary: code suggestions, approach validation
  - "ChatGPT"   # Minor: one-off debugging (JSON/JSONL loader fix)

ai_usage_summary: |
  Claude was used extensively as the primary engineering partner — architectural design
  of the two-pass pipeline, mathematical scoring formulation, edge-case bug detection
  (float equality gates, score saturation via multiplier inflation, null JSON poison
  pills), and iterative code review against the submission spec and JD. Gemini was used
  for secondary validation and code suggestions. ChatGPT assisted with a single
  debugging session (JSON array vs JSONL loader). All final engineering decisions,
  design tradeoffs, local testing, and validation were executed by the team. No
  candidate data was sent to any external API at any point.

# ============================================================================
# Approach summary (≤200 words)
# ============================================================================
methodology_summary: |
  Two-pass hybrid ranker combining heuristic gates with precomputed semantic embeddings,
  strictly optimized for CPU-only constraints.

  Precomputation (offline, ~25 min): All 100K candidate profiles are embedded offline
  using all-MiniLM-L6-v2 and persisted to disk, eliminating runtime encoding overhead.

  Pass 1 — Heuristic Gates (~25s): O(1) string-blob matching across all 100K candidates.
  Hard disqualification gates for honeypots (impossible tenure, expert+zero-duration
  skills, Principal <5yrs, experience floor <3.5yrs), ghost profiles (inactive >180d +
  response rate <10%), and out-of-scope locations. Seven JD trap penalties applied:
  LangChain tourist, pure research, title chaser, hands-off architect, pure consulting,
  keyword stuffer, CV/vision without NLP. Surviving candidates scored on core skill
  depth across the full retrieval/ranking stack (FAISS, Qdrant, Elasticsearch, etc.)
  and production shipping signals.

  Pass 2 — Semantic Re-ranking (~60s): Vectorised NumPy cosine similarity between all
  surviving candidate embeddings and the precomputed JD vector. Final score: semantic
  alignment (45%) + heuristic base (45%) + behavioral bonus (10%) across 9 platform
  signals including response rate, interview completion, notice period, and GitHub
  activity. Additive blend prevents score saturation.

